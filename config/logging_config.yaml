version: 1
disable_existing_loggers: false
formatters:
  simple:
    format: "%(asctime)s - %(levelname)s - %(message)s"
  detailed:
    format: "%(asctime)s - %(name)s:%(lineno)d - %(levelname)s - %(message)s"
handlers:
  # 控制台处理器
  console_handler:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
  # 普通文件处理器
  info_file_handler:
    class: logging.FileHandler
    level: INFO
    formatter: detailed
    filename: ./log/info_app.log
    encoding: utf-8
  # 以大小文件处理器
  rotating_file_handler:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ./log/rotating_app.log
    maxBytes: 10485760
    backupCount: 21
    encoding: utf-8
  # 以时间为滚动的文件处理器
  timed_file_handler:
    class: logging.handlers.TimedRotatingFileHandler
    level: INFO
    formatter: detailed
    filename: ./log/timed_app.log
    when: "midnight"
    interval: 1
    backupCount: 30
    encoding: utf-8
root:
  level: INFO
  handlers: [console_handler,timed_file_handler]